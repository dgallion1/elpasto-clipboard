# elpasto coturn config — base settings.
#
# realm and external-ip are NOT set here. Pass them on the coturn command line
# (see docker-compose.yml `command:` block) so this file stays deployment-neutral.
#
#   --realm=<your-domain>
#   --external-ip=<public-ip-or-${PRIVATE_IP}/${PUBLIC_IP}-for-NAT>

listening-port=3478
min-port=49152
max-port=49200
use-auth-secret
fingerprint
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
# Bandwidth and allocation limits
total-quota=100
user-quota=10
max-bps=256000
bps-capacity=1048576

no-tls
no-dtls
log-file=stdout
prometheus
